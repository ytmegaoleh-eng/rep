<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DARK SMS • OPERATOR</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #000 url('https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?auto=format&fit=crop&q=90') center/cover no-repeat fixed;
      font-family: 'Courier New', monospace;
      color: #0ff;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Glitch overlay для атмосферы */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(transparent 50%, rgba(255,0,255,0.03) 50%);
      background-size: 100% 4px;
      pointer-events: none;
      animation: scanline 8s linear infinite;
      mix-blend-mode: screen;
    }

    @keyframes scanline {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 1;
      padding: 20px;
      max-width: 90%;
    }

    .title {
      font-size: clamp(3rem, 12vw, 8rem);
      font-weight: bold;
      letter-spacing: 0.1em;
      color: #fff;
      text-shadow: 
        0 0 10px #0ff,
        0 0 20px #0ff,
        0 0 40px #f0f,
        0 0 80px #f0f,
        0 0 120px #f0f;
      animation: glitch 4s infinite, glow 3s ease-in-out infinite alternate;
    }

    @keyframes glitch {
      0% { text-shadow: 2px 2px #f0f, -2px -2px #0ff; }
      10% { text-shadow: -2px 2px #f0f, 2px -2px #0ff; }
      20% { text-shadow: 2px -2px #0ff, -2px 2px #f0f; }
      30%, 100% { text-shadow: none; }
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 40px #f0f; }
      to   { text-shadow: 0 0 20px #0ff, 0 0 40px #f0f, 0 0 80px #f0f; }
    }

    .subtitle {
      font-size: clamp(1.5rem, 6vw, 3rem);
      margin: 20px 0 40px;
      color: #ff00aa;
      text-shadow: 0 0 15px #ff00aa;
      letter-spacing: 0.3em;
    }

    .btn {
      display: inline-block;
      padding: 20px 60px;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: bold;
      color: #fff;
      background: linear-gradient(45deg, #0ff, #f0f, #0ff);
      background-size: 400%;
      border: 3px solid #0ff;
      border-radius: 15px;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      box-shadow: 0 0 30px #0ff, inset 0 0 20px rgba(0,255,255,0.5);
      transition: all 0.4s;
      position: relative;
      overflow: hidden;
      animation: btnPulse 3s infinite;
    }

    .btn:hover {
      transform: scale(1.08);
      box-shadow: 0 0 60px #f0f, 0 0 100px #0ff;
      animation: none;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.6s;
    }

    .btn:hover::before {
      opacity: 1;
      animation: shine 1.5s;
    }

    @keyframes btnPulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.05); }
    }

    @keyframes shine {
      0% { transform: translateX(-100%) translateY(-100%); }
      100% { transform: translateX(100%) translateY(100%); }
    }

    .link-info {
      margin-top: 30px;
      font-size: 1.2rem;
      color: #0ff;
      opacity: 0.8;
    }

    @media (max-width: 600px) {
      .btn { padding: 15px 40px; font-size: 2rem; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1 class="title">DARK SMS</h1>
  <div class="subtitle">OPERATOR ONLINE</div>
  
  <a href="https://t.me/electrum_store" target="_blank" class="btn">
    OPERATOR
  </a>

  <div class="link-info" HR Electrum PL</div>
</div>

</body>
</html>o
