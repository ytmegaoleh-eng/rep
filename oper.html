<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>DARK SMS • OPERATOR</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    
    body {
      min-height: 100vh;
      background: #000 url('bgJPG') center/cover no-repeat fixed;
      font-family: 'Courier New', monospace;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .container {
      text-align: center;
      width: 100%;
      padding: 20px;
      max-width: 540px;
    }

    .title {
      font-size: clamp(4.8rem, 19vw, 10rem);
      font-weight: 900;
      letter-spacing: 0.06em;
      text-shadow: 0 0 50px #00ffff, 0 0 90px #ff00aa, 0 0 140px #ff2200;
      margin-bottom: 15px;
    }

    .subtitle {
      font-size: clamp(1.9rem, 7.5vw, 3.4rem);
      margin-bottom: 65px;
      color: #ff0044;
      text-shadow: 0 0 45px #ff0044;
      letter-spacing: 0.45em;
    }

    .btn {
      width: 92%;
      max-width: 420px;
      margin: 0 auto 30px;
      padding: 32px 40px;
      font-size: clamp(2.6rem, 9vw, 4.5rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.42em;
      color: #fff;
      background: linear-gradient(135deg, #ff2200, #ff6600, #ffaa00);
      border: 7px solid #ffdd00;
      border-radius: 32px;
      box-shadow: 0 0 70px #ff2200, 0 0 140px #ff6600;
      cursor: pointer;
    }

    .btn:active {
      transform: scale(0.9);
    }

    /* ЖЁСТКИЙ АГРЕССИВНЫЙ ВЗРЫВ */
    body.explode::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, #ffff00 8%, #ff8800 28%, #ff2200 50%, #000 80%);
      z-index: 100;
      animation: hardExplosion 2.9s forwards;
      pointer-events: none;
    }

    @keyframes hardExplosion {
      0%   { opacity: 0; transform: scale(0.1); }
      14%  { opacity: 1; transform: scale(2.1); }
      48%  { opacity: 0.97; transform: scale(3.6); }
      100% { opacity: 0; transform: scale(6); }
    }
