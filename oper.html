<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DARK SMS • OPERATOR</title>
  <style>
    :root {
      --fire: #ff3d00;
      --flame: #ffaa00;
      --glow: #ffeb3b;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height: 100vh;
      background: #0a0005 url('https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?auto=format&fit=crop&q=90') center/cover fixed;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .title {
      font-size: clamp(6rem, 22vw, 18rem);
      font-weight: 900;
      letter-spacing: 0.05em;
      color: #fff;
      text-shadow: 
        0 0 40px #00ffff,
        0 0 80px #ff00aa,
        0 0 120px var(--fire);
      animation: titleGlow 4s ease-in-out infinite alternate;
    }

    @keyframes titleGlow {
      from { text-shadow: 0 0 40px #00ffff, 0 0 80px #ff00aa, 0 0 120px var(--fire); }
      to   { text-shadow: 0 0 60px #00ffff, 0 0 110px #ff00aa, 0 0 160px var(--glow); }
    }

    .subtitle {
      font-size: clamp(2.2rem, 8vw, 5.5rem);
      margin: 25px 0 80px;
      color: #ff00aa;
      text-shadow: 0 0 50px #ff00aa;
      letter-spacing: 0.5em;
    }

    .btn {
      position: relative;
      padding: 34px 120px;
      font-size: clamp(3rem, 10vw, 7.5rem);
      font-weight: 900;
      color: white;
      text-transform: uppercase;
      letter-spacing: 0.45em;
      background: linear-gradient(135deg, var(--fire), var(--flame), var(--glow), var(--fire));
      background-size: 300% 300%;
      border: 7px solid #ffeb3b;
      border-radius: 40px;
      box-shadow: 0 0 70px var(--fire), 0 0 140px var(--flame), inset 0 0 40px rgba(255,255,255,0.4);
      cursor: pointer;
      animation: flameMove 6s linear infinite, pulseBtn 2.8s ease-in-out infinite;
      transition: all 0.4s;
    }

    .btn:hover {
      transform: scale(1.12) translateY(-8px);
      box-shadow: 0 0 120px #ffeb3b, 0 0 200px var(--fire);
    }

    @keyframes flameMove {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes pulseBtn {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.06); }
    }

    /* КРАСИВЫЙ ЭФФЕКТ ВЗРЫВА И СГОРАНИЯ */
    body.burning::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, #ffeb3b 10%, #ffaa00 30%, #ff3d00 50%, transparent 80%);
      opacity: 0;
      z-index: 20;
      pointer-events: none;
      animation: fireExplosion 3s forwards;
    }

    @keyframes fireExplosion {
      0%   { opacity: 0; transform: scale(0.3); }
      15%  { opacity: 1; transform: scale(1.6); }
      50%  { opacity: 0.95; transform: scale(2.4); }
      100% { opacity: 0; transform: scale(4.5); }
    }

    body.burning .container {
      animation: meltAndBurn 3s forwards;
    }

    @keyframes meltAndBurn {
      0%   { filter: brightness(1) contrast(1); transform: scale(1); }
      40%  { filter: brightness(0.4) contrast(2.5) hue-rotate(30deg); transform: scale(1.1) translateY(-20px); }
      100% { filter: brightness(0) contrast(0); transform: scale(0.6) translateY(120px); opacity: 0; }
    }

    .link-info {
      margin-top: 70px;
      font-size: 1.7rem;
      color: #00ffff;
      text-shadow: 0 0 30px #00ffff;
    }
  </style>
</head>
<body>

<div class="container">
  <h1 class="title">DARK SMS</h1>
  <div class="subtitle">OPERATOR ONLINE</div>
  <div class="btn" id="btn">OPERATOR</div>
  <div class="link-info">t.me/electrum_store • HR Electrum PL</div>
</div>

<script>
  document.getElementById('btn').addEventListener('click', function() {
    document.body.classList.add('burning');

    setTimeout(() => {
      window.open('https://t.me/electrum_store', '_blank');
    }, 3000);
  });
</script>

</body>
</html>
