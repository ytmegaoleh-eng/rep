<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DARK SMS • OPERATOR</title>
  <style>
    :root {
      --fire1: #ff3d00;
      --fire2: #ffaa00;
      --fire3: #ffeb3b;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height: 100vh;
      background: #0a0005 url('https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?auto=format&fit=crop&q=90') center/cover fixed;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 10;
      text-align: center;
    }

    .title {
      font-size: clamp(6rem, 20vw, 16rem);
      font-weight: 900;
      letter-spacing: 0.1em;
      color: transparent;
      background: linear-gradient(90deg, #fff, #00ffff, #ff00aa, #fff);
      -webkit-background-clip: text;
      text-shadow: 0 0 80px #ff3d00, 0 0 140px #ffaa00;
      animation: titleBurn 4s infinite alternate;
    }

    .subtitle {
      font-size: clamp(2.2rem, 9vw, 6rem);
      margin: 20px 0 70px;
      color: #ff00aa;
      text-shadow: 0 0 50px #ff00aa;
      letter-spacing: 0.6em;
    }

    .btn {
      position: relative;
      padding: 32px 110px;
      font-size: clamp(2.8rem, 9vw, 7rem);
      font-weight: 900;
      color: white;
      text-transform: uppercase;
      letter-spacing: 0.5em;
      background: linear-gradient(135deg, #ff3d00, #ffaa00, #ffeb3b);
      border: 6px solid #ffeb3b;
      border-radius: 35px;
      box-shadow: 0 0 80px #ff3d00, 0 0 160px #ffaa00;
      cursor: pointer;
      transition: all 0.3s;
      z-index: 20;
    }

    .btn:hover {
      transform: scale(1.15) translateY(-10px);
      box-shadow: 0 0 140px #ffeb3b, 0 0 220px #ff3d00;
    }

    /* Экран трясётся при взрыве */
    body.exploding {
      animation: shake 0.8s cubic-bezier(.36,.07,.19,.97) both;
    }

    @keyframes shake {
      10%, 90% { transform: translate3d(-4px, 0, 0); }
      20%, 80% { transform: translate3d(6px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
      40%, 60% { transform: translate3d(8px, 0, 0); }
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="container">
  <h1 class="title">DARK SMS</h1>
  <div class="subtitle">OPERATOR ONLINE</div>
  <div class="btn" id="btn">OPERATOR</div>
</div>

<script>
// ==================== ЧАСТИЦЫ ОГНЯ ====================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

class Particle {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.size = Math.random() * 9 + 4;
    this.speedX = Math.random() * 14 - 7;
    this.speedY = Math.random() * -18 - 8;
    this.gravity = 0.25;
    this.life = 110;
    this.hue = Math.random() * 40 + 10; // оранжево-красный спектр
  }
  update() {
    this.speedY += this.gravity;
    this.x += this.speedX;
    this.y += this.speedY;
    this.life--;
    this.size *= 0.98;
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.life / 110;
    ctx.fillStyle = `hsl(${this.hue}, 100%, 65%)`;
    ctx.shadowBlur = 25;
    ctx.shadowColor = `hsl(${this.hue}, 100%, 80%)`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

let particles = [];

function createExplosion(x, y, count) {
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x, y));
  }
}

function animate() {
  ctx.fillStyle = 'rgba(10, 0, 5, 0.12)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].draw();
    if (particles[i].life <= 0) particles.splice(i, 1);
  }
  requestAnimationFrame(animate);
}
animate();

// ==================== ВЗРЫВ ====================
document.getElementById('btn').addEventListener('click', function(e) {
  const rect = this.getBoundingClientRect();
  const centerX = rect.left + rect.width / 2;
  const centerY = rect.top + rect.height / 2;

  document.body.classList.add('exploding');

  // Мощный взрыв из кнопки
  createExplosion(centerX, centerY, 420);

  // Дополнительные вспышки по всему экрану
  setTimeout(() => createExplosion(canvas.width * 0.3, canvas.height * 0.4, 180), 80);
  setTimeout(() => createExplosion(canvas.width * 0.7, canvas.height * 0.6, 220), 160);
  setTimeout(() => createExplosion(canvas.width * 0.5, canvas.height * 0.2, 150), 300);

  // Через 3 секунды — переход
  setTimeout(() => {
    window.open('https://t.me/electrum_store', '_blank');
  }, 3000);
});
</script>

</body>
</html>
