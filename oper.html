<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>DARK SMS • OPERATOR</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    
    body {
      min-height: 100vh;
      background: #000 url('https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?auto=format&fit=crop&q=90') center/cover fixed;
      font-family: 'Courier New', monospace;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .container {
      text-align: center;
      width: 100%;
      padding: 20px;
      max-width: 540px;
    }

    .title {
      font-size: clamp(4.8rem, 18vw, 9.5rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      text-shadow: 0 0 40px #00ffff, 0 0 80px #ff00aa, 0 0 120px #ff2200;
      margin-bottom: 20px;
    }

    .subtitle {
      font-size: clamp(1.8rem, 7vw, 3.2rem);
      margin-bottom: 60px;
      color: #ff0044;
      text-shadow: 0 0 40px #ff0044;
      letter-spacing: 0.4em;
    }

    .btn {
      width: 92%;
      max-width: 420px;
      margin: 0 auto;
      padding: 28px 40px;
      font-size: clamp(2.4rem, 8.5vw, 4.2rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.4em;
      color: #fff;
      background: linear-gradient(135deg, #ff2200, #ff6600, #ffaa00);
      border: 6px solid #ffdd00;
      border-radius: 30px;
      box-shadow: 0 0 60px #ff2200, 0 0 120px #ff6600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn:active {
      transform: scale(0.92);
    }

    /* === ЖЁСТКИЙ АГРЕССИВНЫЙ ВЗРЫВ === */
    body.explode::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, #ffff00 5%, #ff8800 25%, #ff2200 45%, #000 75%);
      z-index: 100;
      animation: hardExplosion 2.8s forwards;
      pointer-events: none;
    }

    @keyframes hardExplosion {
      0%   { opacity: 0; transform: scale(0.2); }
      12%  { opacity: 1; transform: scale(1.8); }
      45%  { opacity: 0.95; transform: scale(3.2); }
      100% { opacity: 0; transform: scale(5.5); }
    }

    body.explode {
      animation: hardShake 0.9s cubic-bezier(0.36,0.07,0.19,0.97) both;
    }

    @keyframes hardShake {
      10%, 90% { transform: translate3d(-6px, 0, 0); }
      20%, 80% { transform: translate3d(8px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-12px, 0, 0); }
      40%, 60% { transform: translate3d(12px, 0, 0); }
    }

    .container.explode {
      animation: meltHard 2.8s forwards;
    }

    @keyframes meltHard {
      0%   { filter: brightness(1); transform: scale(1); }
      35%  { filter: brightness(0.3) contrast(3) hue-rotate(50deg); transform: scale(1.15) translateY(-30px); }
      100% { filter: brightness(0) contrast(0); transform: scale(0.5) translateY(150px); opacity: 0; }
    }

    .link-info {
      margin-top: 50px;
      font-size: 1.4rem;
      color: #00ffff;
      text-shadow: 0 0 20px #00ffff;
    }
  </style>
</head>
<body>

<div class="container" id="container">
  <h1 class="title">DARK SMS</h1>
  <div class="subtitle">OPERATOR ONLINE</div>
  <div class="btn" id="btn">OPERATOR</div>
  <div class="link-info">t.me/electrum_store • HR Electrum PL</div>
</div>

<script>
  document.getElementById('btn').addEventListener('click', function() {
    const container = document.getElementById('container');
    document.body.classList.add('explode');
    container.classList.add('explode');

    setTimeout(() => {
      window.open('https://t.me/electrum_store', '_blank');
    }, 2900);
  });
</script>

</body>
</html>
